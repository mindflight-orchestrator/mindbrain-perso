services:
  mindbrain:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mindbrain
    restart: unless-stopped
    volumes:
      - mindbrain_data:/data
    ports:
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mindbrain_data:
    driver: local
